<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Curriculum Builder</title>
<style>
  :root { --bg:#101418; --card:#1a2027; --line:#2c353f; --text:#e7edf3; --dim:#93a1af;
          --accent:#4fa3ff; --ok:#3fbf7f; --warn:#e0a63a; --bad:#e06a5a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width:880px; margin:0 auto; padding:32px 20px 80px; }
  h1 { font-size:22px; margin:0 0 4px; } h1 span{color:var(--accent);}
  .sub { color:var(--dim); margin:0 0 24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
          padding:20px; margin-bottom:16px; }
  label { display:block; font-size:12.5px; color:var(--dim); margin:14px 0 4px;
          text-transform:uppercase; letter-spacing:.04em; }
  input, textarea, select { width:100%; background:var(--bg); color:var(--text);
          border:1px solid var(--line); border-radius:6px; padding:9px 10px;
          font:inherit; }
  textarea { resize:vertical; min-height:56px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; } .row > div { flex:1; min-width:180px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .chip { background:var(--bg); border:1px solid var(--line); border-radius:20px;
          padding:3px 10px; font-size:13px; display:inline-flex; gap:6px; align-items:center; }
  .chip button { all:unset; cursor:pointer; color:var(--dim); font-size:14px; line-height:1; }
  .chip button:hover { color:var(--bad); }
  .btn { background:var(--accent); border:none; color:#08131f; font-weight:600;
         padding:10px 18px; border-radius:7px; cursor:pointer; font-size:15px; }
  .btn.secondary { background:transparent; color:var(--accent);
         border:1px solid var(--accent); font-weight:500; }
  .btn:disabled { opacity:.45; cursor:default; }
  .actions { display:flex; gap:10px; margin-top:20px; align-items:center; flex-wrap:wrap; }
  .status { color:var(--dim); font-size:14px; }
  .status .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--line);
        border-top-color:var(--accent); border-radius:50%; margin-right:8px;
        animation:r 0.9s linear infinite; vertical-align:-1px; }
  @keyframes r { to { transform:rotate(360deg); } }
  .pick { border-left:3px solid var(--accent); padding:2px 0 2px 14px; margin:18px 0; }
  .pick h3 { margin:0 0 2px; font-size:16px; } .pick a { color:var(--accent); text-decoration:none; }
  .meta { color:var(--dim); font-size:13px; }
  .conf-high{color:var(--ok);} .conf-medium{color:var(--warn);} .conf-low{color:var(--bad);}
  .seg { font-size:13px; color:var(--dim); margin:2px 0 2px 8px; }
  details { margin-top:14px; } summary { cursor:pointer; color:var(--dim); }
  table { border-collapse:collapse; width:100%; margin-top:10px; font-size:13.5px; }
  td, th { border-bottom:1px solid var(--line); text-align:left; padding:7px 8px 7px 0;
           vertical-align:top; }
  td a { color:var(--accent); text-decoration:none; }
  th { color:var(--dim); font-weight:500; }
  .banner { padding:12px 14px; border-radius:8px; margin-bottom:14px; font-size:14px; }
  .banner.err { background:#3a1f1c; border:1px solid var(--bad); }
  .banner.refused { background:#3a2f1c; border:1px solid var(--warn); }
  .gap { color:var(--warn); }
  .hint { font-size:12.5px; color:var(--dim); margin-top:4px; }
</style>
</head>
<body>
<main>
  <h1>Learning <span>Curriculum</span> Builder</h1>
  <p class="sub">Tell it what you want to learn, how much time you have, and what you
     already know — it curates a YouTube path with reasons for every pick.</p>

  <div class="card" id="form-card">
    <label for="goal">Learning goal *</label>
    <textarea id="goal" placeholder="e.g. Build a small React app this weekend, something like a habit tracker with local storage"></textarea>

    <label for="background">Your background *</label>
    <input id="background" placeholder="e.g. Python backend engineer, 5 years experience">

    <div class="row">
      <div>
        <label for="budget">Time budget (minutes) *</label>
        <input id="budget" type="number" min="15" step="15" value="360">
      </div>
      <div>
        <label for="provider">LLM provider</label>
        <select id="provider">
          <option value="anthropic">Anthropic (Haiku + Sonnet)</option>
          <option value="gemini">Gemini (flash)</option>
        </select>
      </div>
    </div>

    <label>Concepts you already know</label>
    <input id="known-input" placeholder="type a concept and press Enter">
    <div class="chips" id="known-chips"></div>

    <label>Concepts you don't know yet</label>
    <input id="unknown-input" placeholder="type a concept and press Enter">
    <div class="chips" id="unknown-chips"></div>
    <div class="hint">Not sure? Fill goal + background, then let the model propose both lists — edit freely after.</div>

    <label for="constraints">Constraints (optional)</label>
    <input id="constraints" placeholder="e.g. I prefer project-based content. Avoid 'in 100 seconds' intros.">

    <div class="actions">
      <button class="btn secondary" id="suggest-btn">Suggest concepts</button>
      <button class="btn" id="build-btn">Build my curriculum</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div id="result"></div>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const state = { known: [], unknown: [], polling: null };
const DEFAULT_PROVIDER = "{{default_provider}}";  // harmless if unreplaced

// --- chips -------------------------------------------------------------------
function renderChips(kind) {
  const box = $(kind + "-chips");
  box.innerHTML = "";
  state[kind].forEach((c, i) => {
    const el = document.createElement("span");
    el.className = "chip";
    el.append(c);
    const x = document.createElement("button");
    x.textContent = "×";
    x.title = "remove";
    x.onclick = () => { state[kind].splice(i, 1); renderChips(kind); };
    el.append(x);
    box.append(el);
  });
}
function addChip(kind, value) {
  const v = value.trim();
  if (v && !state[kind].includes(v)) { state[kind].push(v); renderChips(kind); }
}
["known", "unknown"].forEach(kind => {
  $(kind + "-input").addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      addChip(kind, e.target.value);
      e.target.value = "";
    }
  });
});

// --- helpers ------------------------------------------------------------------
function setStatus(html) { $("status").innerHTML = html; }
function busy(on) { $("build-btn").disabled = on; $("suggest-btn").disabled = on; }
async function api(path, opts) {
  const r = await fetch(path, opts);
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.detail || r.status + " " + r.statusText);
  return body;
}
const esc = s => { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; };
const mmss = s => Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");

// --- suggest ------------------------------------------------------------------
$("suggest-btn").onclick = async () => {
  if (!$("goal").value.trim()) { setStatus("Fill in the goal first."); return; }
  busy(true); setStatus('<span class="spin"></span>asking the model for concept suggestions…');
  try {
    const s = await api("/api/suggest", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goal: $("goal").value, background: $("background").value,
                             provider: $("provider").value }),
    });
    (s.known || []).forEach(c => addChip("known", c));
    (s.unknown || []).forEach(c => addChip("unknown", c));
    setStatus("Suggestions added — remove any that don't fit.");
  } catch (e) { setStatus("Suggest failed: " + esc(e.message)); }
  busy(false);
};

// --- build + poll --------------------------------------------------------------
$("build-btn").onclick = async () => {
  const goal = $("goal").value.trim(), background = $("background").value.trim();
  const budget = parseInt($("budget").value, 10);
  if (!goal || !background || !(budget > 0)) {
    setStatus("Goal, background and a positive time budget are required."); return;
  }
  busy(true); $("result").innerHTML = "";
  setStatus('<span class="spin"></span>starting…');
  try {
    const { run_id } = await api("/api/curriculum", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        goal, background, time_budget_minutes: budget,
        known: state.known, unknown: state.unknown,
        constraints: $("constraints").value, provider: $("provider").value,
      }),
    });
    state.polling = setInterval(() => poll(run_id), 3000);
  } catch (e) { setStatus("Failed to start: " + esc(e.message)); busy(false); }
};

async function poll(runId) {
  let job;
  try { job = await api("/api/runs/" + runId); }
  catch (e) { stopPolling(); setStatus("Polling failed: " + esc(e.message)); return; }
  if (job.status === "running") {
    setStatus('<span class="spin"></span>' + esc(job.stage) + "… (runs take 1–3 min)");
    return;
  }
  stopPolling();
  if (job.status === "error") {
    $("result").innerHTML = '<div class="banner err">Run failed: ' + esc(job.error) + "</div>";
    setStatus("");
  } else if (job.status === "refused") {
    const r = job.result;
    $("result").innerHTML =
      '<div class="banner refused"><strong>Request declined.</strong> ' +
      esc(r.reason) + (r.category ? " (" + esc(r.category) + ")" : "") + "</div>";
    setStatus("");
  } else {
    renderCurriculum(job);
    setStatus("Done in " + Math.round(job.seconds) + "s · $" + job.cost_usd);
  }
}
function stopPolling() { clearInterval(state.polling); state.polling = null; busy(false); }

// --- result rendering -----------------------------------------------------------
function renderCurriculum(job) {
  const { topic_plan: plan, curriculum: cur } = job.result;
  const picks = [...cur.picks].sort((a, b) => a.order - b.order);
  let h = '<div class="card">';
  h += "<p><em>" + esc(cur.summary) + "</em></p>";
  h += '<p class="meta"><strong>' + cur.budget.total_minutes + " min planned</strong> of " +
       cur.budget.budget_minutes + " min budget · " + esc(cur.budget.headroom_note) + "</p>";
  h += '<p class="meta">Start: ' + esc(plan.expertise_start) +
       " → <strong>reached: " + esc(cur.expertise_achieved.level) + "</strong><br>" +
       esc(cur.expertise_achieved.justification) + "</p>";

  picks.forEach(p => {
    h += '<div class="pick"><h3>' + p.order + '. <a href="' + esc(p.url) +
         '" target="_blank" rel="noopener">' + esc(p.title) + "</a></h3>";
    h += '<div class="meta">' + p.watch.minutes + " min · confidence " +
         '<span class="conf-' + p.confidence + '">' + p.confidence + "</span></div>";
    if (p.watch.mode === "segments") {
      p.watch.segments.forEach(s => {
        h += '<div class="seg">▸ ' + mmss(s.start_s) + "–" + mmss(s.end_s) +
             (s.chapter_title ? " · " + esc(s.chapter_title) : "") + "</div>";
      });
    }
    h += "<p>" + esc(p.reason) + "</p>";
    h += '<div class="meta">Covers: ' + esc(p.covers_topics.join(", ")) + "</div></div>";
  });

  if (cur.plan_gaps.length) {
    h += '<p class="gap">Not covered by any pick: ' + esc(cur.plan_gaps.join("; ")) + "</p>";
  }
  h += "<details><summary>Considered but dropped (" + cur.dropped.length + ")</summary>";
  h += "<table><tr><th>Video</th><th>Why it lost</th></tr>";
  cur.dropped.forEach(d => {
    const t = d.url
      ? '<a href="' + esc(d.url) + '" target="_blank" rel="noopener">' + esc(d.title) + "</a>"
      : esc(d.title);
    h += "<tr><td>" + t + "</td><td>" + esc(d.reason) + "</td></tr>";
  });
  h += "</table></details></div>";
  $("result").innerHTML = h;
}

// preselect provider from server default if the placeholder was replaced
if (/^(anthropic|gemini)$/.test(DEFAULT_PROVIDER)) $("provider").value = DEFAULT_PROVIDER;
</script>
</body>
</html>
